# List of plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "jaclu/tmux-power-zoom"
set -g @plugin "brendandebeasi/tabby"

# config for plugins
set -g @resurrect-save "M-s"
set -g @resurrect-restore "M-r"
set -g @power_zoom_trigger "M-z"
set -g @power_zoom_without_prefix 1

run "~/.config/tmux/plugins/tpm/tpm"
run "sleep 1" # tabbyの読み込みが遅いため少し待つ

set -g prefix M-a
unbind C-b

# tmuxを256色表示できるようにする
set -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'
set -g status-style bg=default
set -g base-index 1

# ペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Altキーをつかってwindow操作, pane操作する #はtabbyに影響を受けるもの
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-n next-window #
bind -n M-p previous-window
bind -n M-x kill-pane #

bind -n M-h select-pane -L #
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R #

bind -n M-Down swap-pane -D
bind -n M-Up swap-pane -U

# ペイン分割
bind -n M-/ split-window -h -c "#{pane_current_path}"
bind -n M-\; split-window -v -c "#{pane_current_path}"

# コピーモード
bind -n M-v copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# popup
bind -n M-f display-popup -d '#{pane_current_path}' -w 90% -h 90% -E
bind -n M-g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E 'lazygit'
bind -n M-d display-popup -d '#{pane_current_path}' -w 90% -h 90% -E 'lazydocker'

# for yazi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
